<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Business Card Generator</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace" aria-label="Business card preview">
        <div class="preview-topbar">
          <div>
            <p class="eyebrow">Card Generator</p>
            <h1>Business Card Maker</h1>
          </div>
          <div class="actions">
            <button id="downloadPng" class="primary-button" type="button">PNG</button>
            <button id="printPdf" type="button">A4 PDF</button>
          </div>
        </div>

        <div class="preview-stage">
          <article id="cardPreview" class="business-card layout-left font-inter">
            <div class="card-accent"></div>
            <div class="card-content">
              <div id="companyBlock" class="card-item company-block">
                <p id="previewCompany" class="company">NOVA STUDIO</p>
              </div>
              <div id="nameBlock" class="card-item name-block">
                <h2 id="previewName">Alex Kim</h2>
              </div>
              <div id="roleBlock" class="card-item role-block">
                <p id="previewRole" class="role">Brand Designer</p>
              </div>
              <div id="contactBlock" class="card-item contact-block">
                <p id="previewPhone">010-1234-5678</p>
                <p id="previewEmail">hello@novastudio.kr</p>
                <p id="previewWebsite">novastudio.kr</p>
                <p id="previewAddress">Seoul, Korea</p>
              </div>
            </div>
          </article>
        </div>

        <div class="print-sheet" id="printSheet" aria-hidden="true"></div>
      </section>

      <aside class="controls" aria-label="Card settings">
        <div class="panel">
          <div class="panel-header">
            <h2>Information</h2>
          </div>
          <label>
            Name
            <input id="nameInput" type="text" value="Alex Kim" />
          </label>
          <label>
            Title
            <input id="roleInput" type="text" value="Brand Designer" />
          </label>
          <label>
            Company
            <input id="companyInput" type="text" value="NOVA STUDIO" />
          </label>
          <label>
            Phone
            <input id="phoneInput" type="text" value="010-1234-5678" />
          </label>
          <label>
            Email
            <input id="emailInput" type="email" value="hello@novastudio.kr" />
          </label>
          <label>
            Website
            <input id="websiteInput" type="text" value="novastudio.kr" />
          </label>
          <label>
            Address
            <input id="addressInput" type="text" value="Seoul, Korea" />
          </label>
        </div>

        <div class="panel">
          <div class="panel-header">
            <h2>Design</h2>
          </div>
          <div class="button-grid">
            <button id="randomLayout" type="button">Randomize Layout</button>
            <button id="randomFont" type="button">Randomize Type</button>
          </div>
          <div class="color-row">
            <label>
              Card Color
              <input id="colorPicker" type="color" value="#ffffff" />
            </label>
            <label>
              Color Code
              <input id="colorCode" type="text" value="#ffffff" maxlength="9" />
            </label>
          </div>
          <div>
            <h3>Current Type</h3>
            <p id="styleStatus"></p>
          </div>
          <label>
            Size Mode
            <select id="sizeModeSelect">
              <option value="two" selected>2 sizes</option>
              <option value="one">1 size</option>
            </select>
          </label>
          <div class="font-controls">
            <label>
              Name Font
              <select id="nameFontSelect">
                <option value="Inter, Arial, Helvetica, sans-serif" selected>Inter</option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="'Courier New', Courier, monospace">Courier</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="'Times New Roman', Times, serif">Times</option>
              </select>
            </label>
            <label>
              Info Font
              <select id="bodyFontSelect">
                <option value="Inter, Arial, Helvetica, sans-serif" selected>Inter</option>
                <option value="Arial, Helvetica, sans-serif">Arial</option>
                <option value="Georgia, 'Times New Roman', serif">Georgia</option>
                <option value="'Courier New', Courier, monospace">Courier</option>
                <option value="Verdana, Geneva, sans-serif">Verdana</option>
                <option value="'Times New Roman', Times, serif">Times</option>
              </select>
            </label>
            <label>
              Name Size
              <input id="nameSizeInput" type="number" min="12" max="58" value="42" />
            </label>
            <label>
              Info Size
              <input id="bodySizeInput" type="number" min="8" max="20" value="12" />
            </label>
            <label>
              Name Weight
              <select id="nameWeightSelect">
                <option value="400">400</option>
                <option value="700">700</option>
                <option value="800" selected>800</option>
                <option value="900">900</option>
              </select>
            </label>
            <label>
              Info Weight
              <select id="bodyWeightSelect">
                <option value="400" selected>400</option>
                <option value="700">700</option>
                <option value="800">800</option>
              </select>
            </label>
          </div>
        </div>

        <div class="panel compact">
          <div class="panel-header">
            <h2>Export</h2>
          </div>
          <label>
            Copies on A4
            <select id="copiesSelect">
              <option value="8" selected>8 cards</option>
              <option value="10">10 cards</option>
            </select>
          </label>
        </div>
      </aside>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
